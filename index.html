<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d3d4d6">
<title>MusicMatch · iPod</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="device" id="device">

  <!-- ============ SCREEN ============ -->
  <div class="screen-bezel">
    <div class="screen" id="screen">
      <div class="statusbar" id="statusbar">
        <span class="status-left" id="statusPlayIcon"></span>
        <span class="status-title" id="statusTitle">iPod</span>
        <span class="status-right">
          <span class="battery"><span class="battery-fill"></span></span>
        </span>
      </div>
      <div class="screen-content" id="screenContent"></div>
      <div class="mood-hint" id="moodHint">
        <span class="mh-dot" id="moodHintDot"></span>
        <span class="mh-text" id="moodHintText"></span>
        <span class="mh-sub">drop the button on a mood &middot; centre = cancel</span>
      </div>
    </div>
  </div>

  <!-- ============ CLICK WHEEL ============ -->
  <div class="wheel-area">
    <div class="click-wheel" id="wheel">
      <span class="wheel-label label-menu">MENU</span>
      <span class="wheel-label label-prev">
        <svg viewBox="0 0 24 14" width="19" height="12"><g fill="currentColor"><path d="M12 7 22 0v14zM2 7 12 0v14z"/><rect x="0" y="0" width="2.4" height="14"/></g></svg>
      </span>
      <span class="wheel-label label-next">
        <svg viewBox="0 0 24 14" width="19" height="12"><g fill="currentColor"><path d="M12 7 2 0v14zM22 7 12 0v14z"/><rect x="21.6" y="0" width="2.4" height="14"/></g></svg>
      </span>
      <span class="wheel-label label-play">
        <svg viewBox="0 0 30 14" width="23" height="12"><g fill="currentColor"><path d="M0 0 10 7 0 14z"/><rect x="14" y="0" width="3.2" height="14"/><rect x="20" y="0" width="3.2" height="14"/></g></svg>
      </span>
      <div class="center-button" id="centerBtn"></div>
    </div>

    <div class="mood-picker" id="moodPicker">
      <div class="mood-quad quad-intense" data-mood="intense"><span>Intense</span></div>
      <div class="mood-quad quad-hype" data-mood="hype"><span>Hype</span></div>
      <div class="mood-quad quad-blue" data-mood="blue"><span>Melancholy</span></div>
      <div class="mood-quad quad-chill" data-mood="chill"><span>Chill</span></div>
      <div class="mood-deadzone"></div>
      <div class="mood-puck" id="moodPuck"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
