<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d2d3d5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AA music">
<title>AA music</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="styles.css?v=7">
</head>
<body>

<div class="device" id="device">

  <!-- ============ SCREEN ============ -->
  <div class="screen-bezel">
    <div class="screen" id="screen">
      <div class="statusbar" id="statusbar">
        <span class="status-left" id="statusPlayIcon"></span>
        <span class="status-title" id="statusTitle">iPod</span>
        <span class="status-right">
          <span class="battery"><span class="battery-fill"></span></span>
        </span>
      </div>
      <div class="screen-content" id="screenContent"></div>
      <div class="idle-clock" id="idleClock">
        <svg viewBox="0 0 100 100" class="clock-face">
          <circle cx="50" cy="50" r="46" fill="#fff" stroke="#c8ccd1" stroke-width="2"/>
          <g stroke="#3a4048" stroke-width="2.6" stroke-linecap="round">
            <line x1="50" y1="6"  x2="50" y2="13"/><line x1="50" y1="94" x2="50" y2="87"/>
            <line x1="6"  y1="50" x2="13" y2="50"/><line x1="94" y1="50" x2="87" y2="50"/>
          </g>
          <g stroke="#9aa1aa" stroke-width="1.4" stroke-linecap="round">
            <line x1="72" y1="11.9" x2="68.5" y2="18"/><line x1="88.1" y1="28" x2="82" y2="31.5"/>
            <line x1="88.1" y1="72" x2="82" y2="68.5"/><line x1="72" y1="88.1" x2="68.5" y2="82"/>
            <line x1="28" y1="88.1" x2="31.5" y2="82"/><line x1="11.9" y1="72" x2="18" y2="68.5"/>
            <line x1="11.9" y1="28" x2="18" y2="31.5"/><line x1="28" y1="11.9" x2="31.5" y2="18"/>
          </g>
          <line id="clockHour" x1="50" y1="50" x2="50" y2="28" stroke="#1d2227" stroke-width="4" stroke-linecap="round"/>
          <line id="clockMin"  x1="50" y1="50" x2="50" y2="16" stroke="#1d2227" stroke-width="2.6" stroke-linecap="round"/>
          <line id="clockSec"  x1="50" y1="56" x2="50" y2="14" stroke="#c8483c" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="50" cy="50" r="2.6" fill="#1d2227"/>
        </svg>
        <div class="clock-date" id="clockDate"></div>
        <div class="clock-track" id="clockTrack"></div>
      </div>
      <div class="mood-hint" id="moodHint">
        <span class="mh-dot" id="moodHintDot"></span>
        <span class="mh-text" id="moodHintText"></span>
        <span class="mh-sub">drop the button on a mood &middot; centre = cancel</span>
      </div>
    </div>
  </div>

  <!-- ============ CLICK WHEEL ============ -->
  <div class="wheel-area">
    <div class="click-wheel" id="wheel">
      <span class="wheel-label label-menu">MENU</span>
      <span class="wheel-label label-prev">
        <svg viewBox="0 0 24 14" width="19" height="12"><g fill="currentColor"><path d="M12 7 22 0v14zM2 7 12 0v14z"/><rect x="0" y="0" width="2.4" height="14"/></g></svg>
      </span>
      <span class="wheel-label label-next">
        <svg viewBox="0 0 24 14" width="19" height="12"><g fill="currentColor"><path d="M12 7 2 0v14zM22 7 12 0v14z"/><rect x="21.6" y="0" width="2.4" height="14"/></g></svg>
      </span>
      <span class="wheel-label label-play">
        <svg viewBox="0 0 30 14" width="23" height="12"><g fill="currentColor"><path d="M0 0 10 7 0 14z"/><rect x="14" y="0" width="3.2" height="14"/><rect x="20" y="0" width="3.2" height="14"/></g></svg>
      </span>
      <div class="center-button" id="centerBtn"></div>
    </div>

    <div class="mood-picker" id="moodPicker">
      <div class="mood-quad quad-intense" data-mood="intense"><span>Intense</span></div>
      <div class="mood-quad quad-hype" data-mood="hype"><span>Hype</span></div>
      <div class="mood-quad quad-blue" data-mood="blue"><span>Melancholy</span></div>
      <div class="mood-quad quad-chill" data-mood="chill"><span>Chill</span></div>
      <div class="mood-deadzone"></div>
      <div class="mood-puck" id="moodPuck"></div>
    </div>
  </div>

</div>

<script src="spotify.js?v=3"></script>
<script src="app.js?v=12"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
